<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Webデザイン制作実績</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #fafaf8;
      color: #2c2c2c;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e8e0d8;
      padding: 32px 48px;
      text-align: center;
    }

    header h1 {
      font-family: 'Georgia', serif;
      font-size: 28px;
      letter-spacing: 0.2em;
      color: #2c2c2c;
      margin-bottom: 8px;
    }

    header p {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.1em;
    }

    main {
      max-width: 900px;
      margin: 64px auto;
      padding: 0 24px;
    }

    .section-title {
      font-size: 12px;
      letter-spacing: 0.3em;
      color: #c9a96e;
      text-transform: uppercase;
      margin-bottom: 32px;
      text-align: center;
    }

    .works {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      transition: transform 0.3s, box-shadow 0.3s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      font-size: 20px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.8);
    }

    .thumb-salon {
      background: linear-gradient(135deg, #f5ede0 0%, #c9a96e 100%);
      color: #6b4c2a;
    }

    .thumb-nail {
      background: linear-gradient(135deg, #fdeef3 0%, #d4a5b5 100%);
      color: #8a4a60;
    }

    .card-body {
      padding: 20px 24px 24px;
    }

    .card-tag {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #c9a96e;
      background: #fdf8f0;
      padding: 3px 10px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .card-title {
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      font-size: 18px;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 13px;
      color: #888;
      line-height: 1.9;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: #c9a96e;
    }

    footer {
      text-align: center;
      padding: 48px 24px;
      font-size: 12px;
      color: #aaa;
      letter-spacing: 0.1em;
    }

    @media (max-width: 600px) {
      header { padding: 24px 20px; }
      .works { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <h1>PORTFOLIO</h1>
    <p>Webデザイン制作実績</p>
  </header>

  <main>
    <p class="section-title">Works</p>
    <div class="works">

      <a class="card" href="portfolio_salon_lp.html" target="_blank">
        <div class="card-thumb thumb-salon">LUMIERE HAIR</div>
        <div class="card-body">
          <span class="card-tag">LP制作</span>
          <div class="card-title">美容院 ランディングページ</div>
          <p class="card-desc">自由が丘の架空美容院「LUMIERE HAIR」のLP。コンセプト・メニュー・料金・アクセスを含むフルページ構成。レスポンシブ対応。</p>
          <div class="card-link">サンプルを見る →</div>
        </div>
      </a>

      <a class="card" href="portfolio_nail_lp.html" target="_blank">
        <div class="card-thumb thumb-nail">FLEUR NAIL</div>
        <div class="card-body">
          <span class="card-tag">LP制作</span>
          <div class="card-title">ネイルサロン ランディングページ</div>
          <p class="card-desc">表参道の架空ネイルサロン「FLEUR NAIL」のLP。ギャラリー・料金・こだわり・予約セクションを含むフルページ構成。レスポンシブ対応。</p>
          <div class="card-link">サンプルを見る →</div>
        </div>
      </a>

    </div>
  </main>

  <footer>
    <p>Webデザイン制作 ポートフォリオ</p>
  </footer>

</body>
</html>
